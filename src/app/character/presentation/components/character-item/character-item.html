<mat-card>
  <img mat-card-image
       [src]="character.imageUrl"
       [alt]="character.name">

  <mat-card-header>
    <mat-card-title>{{ character.name }}</mat-card-title>
    <mat-card-subtitle>{{ character.species }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <p><strong>Status:</strong> {{ character.status }}</p>
    <p><strong>Gender:</strong> {{ character.gender }}</p>
    <p><strong>Origin:</strong> {{ character.originName }}</p>
    <p><strong>Location:</strong> {{ character.locationName }}</p>
  </mat-card-content>

  <mat-card-actions>
    <a mat-button
       [href]="character.characterUrl"
       target="_blank"
       rel="noopener"
       [attr.aria-label]="'View details of ' + character.name">
      View Character Details
    </a>

    <button mat-button
            type="button"
            [attr.aria-label]="'Share ' + character.name">
      Share Character
    </button>
  </mat-card-actions>
</mat-card>
